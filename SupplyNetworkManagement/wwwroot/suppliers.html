<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vendor Catalogue - Supply Network Management</title>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-top">
                <h2>Supply Network Management</h2>
                <p>Vendor Catalogue</p>
                <div class="sidebar-line"></div>
            </div>

            <div class="sidebar-nav">
                <button class="side-btn active" id="navCreateBtn" type="button">Create</button>
                <button class="side-btn" id="navManageBtn" type="button">Manage</button>
                <button class="side-btn" id="navBrowseBtn" type="button">Browse</button>
            </div>

            <div class="sidebar-bottom">
                <p>Vendor Catalogue Portal</p>
                <a href="/" class="side-link">Home</a>
                <a href="/suppliers.html" class="side-link">Suppliers</a>
            </div>
        </aside>

        <main class="workspace">
            <section class="screen-title-block">
                <p class="screen-kicker" id="sectionLabel">Create</p>
                <div class="title-line"></div>
            </section>

            <button class="back-btn hidden" id="backToBrowseBtn" type="button">← Back</button>
            <div class="title-line short-line"></div>

            <div id="messageBox" class="message hidden"></div>

            <section class="screen-panel" id="createSection">
                <h3 class="panel-title">Add Product</h3>
                <div class="title-line small-line"></div>

                <form id="addProductForm" class="catalogue-form">
                    <div class="field">
                        <label for="addProductName">Product Name</label>
                        <input type="text" id="addProductName" required />
                    </div>

                    <div class="field">
                        <label for="addUnit">Unit</label>
                        <select id="addUnit" required>
                            <option value="">Select Unit</option>
                            <option value="kg">kg</option>
                            <option value="l">l</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="addCategoryL1">Category Level 1</label>
                        <input type="text" id="addCategoryL1" required />
                    </div>

                    <div class="field">
                        <label for="addQuantity">Quantity</label>
                        <input type="number" id="addQuantity" min="1" step="1" required />
                    </div>

                    <div class="field">
                        <label for="addCategoryL2">Category Level 2</label>
                        <input type="text" id="addCategoryL2" required />
                    </div>

                    <div class="field">
                        <label for="addPrice">Price</label>
                        <input type="number" id="addPrice" min="0" step="0.01" value="0.00" required />
                    </div>

                    <div class="field">
                        <label for="addCategoryL3">Category Level 3</label>
                        <input type="text" id="addCategoryL3" required />
                    </div>

                    <div class="field empty-slot"></div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="reset" class="btn btn-light">Cancel</button>
                    </div>
                </form>
            </section>

            <section class="screen-panel hidden" id="manageSection">
                <h3 class="panel-title">Update Product</h3>
                <div class="title-line small-line"></div>

                <form id="editProductForm" class="catalogue-form">
                    <div class="field">
                        <label for="editProductId">Product ID</label>
                        <input type="text" id="editProductId" required readonly />
                    </div>

                    <div class="field">
                        <label for="editCategoryL3">Category Level 3</label>
                        <input type="text" id="editCategoryL3" required />
                    </div>

                    <div class="field">
                        <label for="editProductName">Product Name</label>
                        <input type="text" id="editProductName" required />
                    </div>

                    <div class="field">
                        <label for="editUnit">Unit</label>
                        <select id="editUnit" required>
                            <option value="">Select Unit</option>
                            <option value="kg">kg</option>
                            <option value="l">l</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="editCategoryL1">Category Level 1</label>
                        <input type="text" id="editCategoryL1" required />
                    </div>

                    <div class="field">
                        <label for="editQuantity">Quantity</label>
                        <input type="number" id="editQuantity" min="1" step="1" required />
                    </div>

                    <div class="field">
                        <label for="editCategoryL2">Category Level 2</label>
                        <input type="text" id="editCategoryL2" required />
                    </div>

                    <div class="field">
                        <label for="editPrice">Price</label>
                        <input type="number" id="editPrice" min="0" step="0.01" value="0.00" required />
                    </div>

                    <div class="form-actions single-action">
                        <button type="submit" class="btn btn-primary">Update</button>
                    </div>
                </form>
            </section>

            <section class="screen-panel hidden" id="browseSection">
                <div class="browse-header-row">
                    <div>
                        <h3 class="panel-title">Catalogue List</h3>
                        <div class="title-line small-line"></div>
                    </div>

                    <div class="catalogue-tools">
                        <input type="text" id="searchInput" placeholder="Search by product name..." />
                        <button id="refreshBtn" class="btn btn-light" type="button">Refresh</button>
                    </div>
                </div>

                <div class="browse-layout">
                    <div class="catalogue-card-list" id="catalogueBody"></div>

                    <div class="catalogue-detail">
                        <div class="detail-empty" id="detailEmptyState">
                            Select a catalogue item to view full details.
                        </div>

                        <div class="detail-card hidden" id="detailCard">
                            <div class="detail-card-top">
                                <h4 id="detailTitle">Product Details</h4>
                                <span class="detail-unit" id="detailUnit">kg</span>
                            </div>

                            <div class="detail-grid">
                                <div class="detail-box">
                                    <span class="detail-label">Product ID</span>
                                    <span id="detailProductId"></span>
                                </div>

                                <div class="detail-box">
                                    <span class="detail-label">Product Name</span>
                                    <span id="detailProductName"></span>
                                </div>

                                <div class="detail-box">
                                    <span class="detail-label">Category Level 1</span>
                                    <span id="detailCategoryL1"></span>
                                </div>

                                <div class="detail-box">
                                    <span class="detail-label">Category Level 2</span>
                                    <span id="detailCategoryL2"></span>
                                </div>

                                <div class="detail-box">
                                    <span class="detail-label">Category Level 3</span>
                                    <span id="detailCategoryL3"></span>
                                </div>

                                <div class="detail-box">
                                    <span class="detail-label">Quantity</span>
                                    <span id="detailQuantity"></span>
                                </div>

                                <div class="detail-box detail-box-wide">
                                    <span class="detail-label">Price</span>
                                    <span id="detailPrice"></span>
                                </div>
                            </div>

                            <div class="detail-actions">
                                <button type="button" class="btn btn-secondary" id="detailEditBtn">Edit
                                    Selected</button>
                                <button type="button" class="btn btn-danger" id="detailDeleteBtn">Delete
                                    Selected</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/vendorcatalogue.js"></script>
</body>

</html>
